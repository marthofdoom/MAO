# Marth's Alchemy Overhaul — dev/seed config.
# Read at kDataLoaded from Data/SKSE/Plugins/MAO.ini. The P1 MCM (via MCM
# Helper) will write Data/MCM/Settings/MAO.ini, which is read last so it wins.
# Only keys the current build understands take effect; unknown keys are ignored.

[Gathering]
# Per-pickup on-screen essence notifications ("+3 Base Essence (Blue Mountain
# Flower)"). MAO.log always records conversions regardless.
bNotify = 1

[FieldKit]
# Key that opens the read-only Field Kit essence viewer (P0/M2). DirectInput
# scancode, decimal or 0x-hex; 0x25 = K. In P1 the viewer becomes the flask
# UI opened by a lesser power (DESIGN 3.3) and this key becomes a fallback.
iOpenHotkey = 0x25
