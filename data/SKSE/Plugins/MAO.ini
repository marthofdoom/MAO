# Marth's Alchemy Overhaul — dev/seed config.
# Read at kDataLoaded from Data/SKSE/Plugins/MAO.ini. The P1 MCM (via MCM
# Helper) will write Data/MCM/Settings/MAO.ini, which is read last so it wins.
# Only keys the current build understands take effect; unknown keys are ignored.

[Gathering]
# Per-pickup on-screen essence notifications ("+3 Base Essence (Blue Mountain
# Flower)"). MAO.log always records conversions regardless.
bNotify = 1

[FieldKit]
# Opens the read-only Field Kit essence viewer (P0/M2). In P1 the viewer
# becomes the flask UI opened by a lesser power (DESIGN 3.3); these become
# fallbacks. Same control (or B on pad / Esc on keyboard) closes it.
#
# Keyboard: DirectInput scancode, decimal or 0x-hex. 0x25 = K.
iOpenHotkey = 0x25
# Gamepad (Steam Deck has no keyboard — this is the opener there):
# RE::BSWin32GamepadDevice::Key bitflag. 0x20 = Back/View (Deck ⊟ button),
# 0x40 = L3, 0x80 = R3, 0x10 = Start/Menu (☰).
iOpenButtonGamepad = 0x20
