# Marth's Alchemy Overhaul — dev/seed config.
# Read at kDataLoaded from Data/SKSE/Plugins/MAO.ini. The P1 MCM (via MCM
# Helper) will write Data/MCM/Settings/MAO.ini, which is read last so it wins.
# Only keys the current build understands take effect; unknown keys are ignored.

[Gathering]
# Per-pickup on-screen essence notifications ("+3 Base Essence (Blue Mountain
# Flower)"). MAO.log always records conversions regardless.
bNotify = 1

[FieldKit]
# The Field Kit opens by casting the "Open Field Kit" lesser power (equip it in
# Magic > Powers, press the power/shout button). Cast again, or press B (pad) /
# Esc (keyboard), to close. The button openers below are optional fallbacks.
#
# Keyboard fallback: DirectInput scancode (decimal or 0x-hex); 0 = disabled
# (DEFAULT — the power is the opener). A bound key here is live at ALL times,
# so pick one nothing else in your load order uses. 0x25 = K, 0x24 = J.
iOpenHotkey = 0
# Gamepad fallback: RE::BSWin32GamepadDevice::Key bitflag; 0 = disabled
# (DEFAULT — the power is the opener). NOTE: on the Steam Deck the View button
# (0x20) is the same physical button as Select, so do NOT bind the opener there.
# If you want a pad button anyway: 0x40 = L3, 0x80 = R3, 0x10 = Start/Menu (☰).
iOpenButtonGamepad = 0x0
# Field Kit menu skin: 0 = Ebony & Brass, 1 = Dwemer Parchment, 2 = Soul Cairn,
# 3 = Quicksilver.
iMenuStyle = 0

[Economy]
# Convenience tax on flask cost. Per-charge cost = 2 x mean(source ingredient
# gold value for the effect) x fEssenceTax; a potion is ~2 ingredients, so this
# is the vanilla recipe cost plus a tax for the easier flask system. 1.3 = +30%.
# Clamped 1.0..5.0.
fEssenceTax = 1.3
# Flask cost = round(effect baseCost * magnitude * fCostRate * fEssenceTax) per
# charge (linear in potency). Raise/lower to scale all flask costs. 0.05..20.
fCostRate = 1.0
# Potion QUALITY. Log scale: 1.0 is exactly the load order's quality anchor (p15
# of its real, non-food potions — the cheapest potion you'd actually brew), and
# each +0.5 is a doubling of gold value. Clamped 0.4..4.0.
# A flask ABOVE fCatalystQuality also requires Catalyst essence regardless of
# what its ingredients are, and both surcharges GROW with quality.
fCatalystQuality = 1.0
# Apex is guaranteed by LADDER POSITION, not by threshold: the top iApexTopRungs
# rungs of a potion's own family ("... (Remarkable)" / "... (Surpassing)";
# vanilla's Extreme/Ultimate) require Apex. Families come from the installer /
# Synthesis patcher's data (mao_tiers.json "ladders") — without a current file
# the positional guarantee is OFF (MAO.log says DEGRADED; re-run the patcher).
# fApexQuality is only the absolute fallback for a one-off potion with no
# ladder to be the top of. 0 rungs = positional guarantee off.
iApexTopRungs = 2
fApexQuality = 2.5
# Real-time seconds between automatic flask refill passes (dry flasks top up
# from essence). Sleeping also triggers a refill. Clamped 15..86400.
iRefillSeconds = 300
